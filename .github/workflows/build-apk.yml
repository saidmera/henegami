name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4.2.2

      # ── 2. Node.js (Capacitor 8 requires >=22) ────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: npm

      # ── 3. Java ───────────────────────────────────────────────────────────────
      - name: Setup Java 21
        uses: actions/setup-java@v4.7.1
        with:
          distribution: temurin
          java-version: 21

      # ── 4. Android SDK ────────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      # ── 5. Install npm deps ───────────────────────────────────────────────────
      - name: Install dependencies
        run: npm install --ignore-scripts

      # ── 6. Inject secrets as .env ─────────────────────────────────────────────
      - name: Create .env file
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      # ── 7. Vite build → dist/ ─────────────────────────────────────────────────
      - name: Build web assets
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.html || (echo "ERROR: dist/index.html missing!" && exit 1)
          echo "dist/index.html exists ✓"

      # ── 8. Capacitor sync ─────────────────────────────────────────────────────
      # android/ folder is already in the repo — just sync assets
      - name: Capacitor sync
        run: npx cap sync android

      - name: Verify Android assets
        run: |
          test -f android/app/src/main/assets/public/index.html || \
            (echo "ERROR: index.html not in Android assets!" && exit 1)
          echo "Android assets synced ✓"

      # ── 9. Patch proguard (AGP 9 dropped proguard-android.txt) ───────────────
      - name: Patch proguard in app/build.gradle
        run: |
          sed -i "s/getDefaultProguardFile('proguard-android.txt')/getDefaultProguardFile('proguard-android-optimize.txt')/g" \
            android/app/build.gradle
          echo "Proguard patch applied ✓"

      # ── 10. Build debug APK — full output, no pipes ───────────────────────────
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace --info

      # ── 11. Upload APK artifact ───────────────────────────────────────────────
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: chenegami-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
